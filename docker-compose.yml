# DO NOT EDIT - Generated from services.sexp
# Regenerate with: (skewed-generate-all-configs)

networks:
  skewed-network:
    name: ${DOCKER_NETWORK_NAME:-skewed-network}
    driver: bridge

services:

  skewed-emacs:
    image: gornskew/${EMACS_IMAGE_BASE:-skewed-emacs}:${EMACS_IMAGE_BRANCH:-devo}-${EMACS_IMAGE_VARIANT:-full}
    container_name: skewed-emacs
    hostname: skewed-emacs
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "6942:6942"
    environment:
      - HTTP_PORT=7080
      - START_HTTP=true
      - WEBTERM=${WEBTERM:-ttyd}
      - WEBTERM_PORT=6942
      - TERM=xterm-256color
      - COLORTERM=truecolor
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - type: bind
        source: ${PROJECTS_DIR}
        target: /projects
        bind:
          create_host_path: true
      - ${USER_HOME}/.claude/.credentials.json:/home/emacs-user/.claude/.credentials.json
      - ${USER_HOME}/.gemini/google_accounts.json:/home/emacs-user/.gemini/google_accounts.json
      - ${USER_HOME}/.gemini/oauth_creds.json:/home/emacs-user/.gemini/oauth_creds.json
      - ${USER_HOME}/.codex/auth.json:/home/emacs-user/.codex/auth.json
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${EMACS_LOCAL_SRC:-/nonexistent}/.emacs-local:/home/emacs-user/.emacs-local:ro
      - ${EMACS_LOCAL_SRC:-/nonexistent}/.emacs-local-early:/home/emacs-user/.emacs-local-early:ro
    networks:
      - skewed-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7080/lisply/ping-lisp"]
      interval: 108s
      timeout: 3s
      retries: 3
      start_period: 15s

  gendl-ccl:
    image: genworks/${GENDL_IMAGE_BASE:-gendl}:${GENDL_IMAGE_BRANCH:-devo}-ccl
    container_name: gendl-ccl
    hostname: gendl-ccl
    user: root
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "19080:9080"
    environment:
      - HTTP_PORT=9080
      - HTTP_HOST_PORT=19080
      - START_HTTP=true
      - SWANK_PORT=4200
      - START_SWANK=true
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - type: bind
        source: ${PROJECTS_DIR}
        target: /projects
        bind:
          create_host_path: true
    networks:
      - skewed-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/lisply/ping-lisp"]
      interval: 72s
      timeout: 3s
      retries: 3
      start_period: 15s

  gendl-sbcl:
    image: genworks/${GENDL_IMAGE_BASE:-gendl}:${GENDL_IMAGE_BRANCH:-devo}-sbcl
    container_name: gendl-sbcl
    hostname: gendl-sbcl
    user: root
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "29080:9090"
    environment:
      - HTTP_PORT=9090
      - HTTP_HOST_PORT=29080
      - START_HTTP=true
      - SWANK_PORT=4210
      - START_SWANK=true
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - type: bind
        source: ${PROJECTS_DIR}
        target: /projects
        bind:
          create_host_path: true
    networks:
      - skewed-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/lisply/ping-lisp"]
      interval: 90s
      timeout: 3s
      retries: 3
      start_period: 15s
